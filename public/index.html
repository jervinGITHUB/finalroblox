<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Robux UI</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:'Nunito',sans-serif;
color:white;
height:100vh;
overflow:hidden;
}

/* BACKGROUND */

.fake-home{
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
filter:blur(2px);
}

/* MODAL */

.modal{
position:fixed;
left:0;
right:0;
bottom:0;
background:#111318;
border-radius:28px 28px 0 0;
padding:14px 18px 30px;
min-height:82vh;
animation:slideUp .35s ease;
}

@keyframes slideUp{
from{
transform:translateY(100%);
}
to{
transform:translateY(0);
}
}

.handle{
width:44px;
height:5px;
border-radius:999px;
background:rgba(255,255,255,.25);
margin:0 auto 18px;
}

/* HEADER */

.top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:46px;
}

.title{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:900;
}

.balance{
display:flex;
align-items:center;
gap:7px;
font-size:20px;
font-weight:900;
}

/* USER */

.user{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin-bottom:36px;
}

.avatar{
width:92px;
height:92px;
border-radius:50%;
object-fit:cover;
margin-bottom:14px;
background:#222;
}

.username{
font-size:23px;
font-weight:900;
}

/* AMOUNT */

.amount-wrap{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:36px;
}

.amount{
font-size:96px;
font-weight:900;
background:none;
border:none;
outline:none;
color:white;
width:180px;
font-family:'Nunito',sans-serif;
}

.amount::-webkit-inner-spin-button{
display:none;
}

/* BUTTONS */

.quick-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:24px;
}

.quick-btn{
height:66px;
border:none;
border-radius:18px;
background:#242733;
color:white;
font-size:22px;
font-weight:900;
font-family:'Nunito',sans-serif;
display:flex;
align-items:center;
justify-content:center;
gap:7px;
cursor:pointer;
transition:.15s;
}

.quick-btn:hover{
background:#2f3344;
}

.next-btn{
width:100%;
height:68px;
border:none;
border-radius:18px;
background:#2f55ff;
color:white;
font-size:24px;
font-weight:900;
font-family:'Nunito',sans-serif;
cursor:pointer;
transition:.15s;
}

.next-btn:hover{
background:#4165ff;
}

.footer{
text-align:center;
margin-top:18px;
font-size:14px;
font-weight:700;
color:rgba(255,255,255,.55);
}

.robux{
width:24px;
height:24px;
object-fit:contain;
}

.big-robux{
width:42px;
height:42px;
object-fit:contain;
}

</style>
</head>

<body>

<div class="fake-home"></div>

<div class="modal">

<div class="handle"></div>

<div class="top">

<div class="title">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg" class="robux">
<span>Send Robux</span>
</div>

<div class="balance">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux">
<span>0</span>
</div>

</div>

<div class="user">

<img
class="avatar"
src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-3109D49F06F2AA33C8E6D2F6A0A6B5D3-Png/150/150/AvatarHeadshot/Png/noFilter"
>

<div class="username">DVNgiver</div>

</div>

<div class="amount-wrap">

<img
src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg"
class="big-robux"
>

<input
class="amount"
id="amount"
type="number"
value="0"
>

</div>

<div class="quick-grid">

<button class="quick-btn" onclick="setAmount(25)">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux">
25
</button>

<button class="quick-btn" onclick="setAmount(50)">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux">
50
</button>

<button class="quick-btn" onclick="setAmount(100)">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux">
100
</button>

<button class="quick-btn" onclick="setAmount(200)">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Robux_2019_Logo_gold.svg" class="robux">
200
</button>

</div>

<button class="next-btn">
Next
</button>

<div class="footer">
Robux are sent instantly with no fees
</div>

</div>

<script>

function setAmount(num){
document.getElementById('amount').value=num;
}

</script>

</body>
</html>
